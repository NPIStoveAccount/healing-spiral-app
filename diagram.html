<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Healing Spiral — Ten Dimensions of Contact</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    color: #fff;
    overflow-x: hidden;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .container {
    width: 100%;
    max-width: 960px;
    margin: 0 auto;
    padding: 10px 16px 20px;
    position: relative;
  }

  /* SVG wrapper */
  .svg-wrap {
    width: 100%;
    position: relative;
  }
  .svg-wrap svg {
    width: 100%;
    height: auto;
    display: block;
  }

  /* Info panel */
  .info-panel {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    bottom: 12px;
    width: 90%;
    max-width: 600px;
    background: rgba(15, 15, 25, 0.92);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px;
    padding: 20px 24px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.35s ease, transform 0.35s ease;
    transform: translateX(-50%) translateY(8px);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    z-index: 10;
  }
  .info-panel.active {
    opacity: 1;
    pointer-events: auto;
    transform: translateX(-50%) translateY(0);
  }
  .info-panel .dim-category {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 4px;
    opacity: 0.7;
  }
  .info-panel .dim-name {
    font-size: 18px;
    font-weight: 500;
    margin-bottom: 8px;
  }
  .info-panel .dim-desc {
    font-size: 13px;
    line-height: 1.6;
    opacity: 0.75;
    font-weight: 300;
  }
  .info-panel .close-btn {
    position: absolute;
    top: 10px;
    right: 14px;
    background: none;
    border: none;
    color: #888;
    font-size: 18px;
    cursor: pointer;
    line-height: 1;
  }
  .info-panel .close-btn:hover { color: #fff; }

  /* Instruction hint */
  .hint {
    text-align: center;
    color: #556;
    font-size: 11px;
    letter-spacing: 1px;
    margin-top: 6px;
    transition: opacity 0.5s;
  }

  /* Hover zones in SVG */
  .hover-zone {
    cursor: pointer;
    transition: opacity 0.25s;
  }
  .hover-zone:hover { opacity: 1 !important; }

  /* Highlighted state */
  .dim-group { transition: opacity 0.3s, filter 0.3s; }
  .dim-group.dimmed { opacity: 0.15; }
  .dim-group.highlighted { opacity: 1; filter: brightness(1.3); }

  /* Responsive */
  @media (max-width: 600px) {
    .info-panel { width: 95%; padding: 16px 18px; bottom: 8px; }
    .info-panel .dim-name { font-size: 16px; }
    .info-panel .dim-desc { font-size: 12px; }
  }
</style>
</head>
<body>

      <text x="198" y="1033" fill="#667788" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="9" font-weight="300" letter-spacing="0.5">Cascade (dependency sequence)</text>

<script>
const dimensionData = {
  'relational-field': {
    category: 'Ground',
    name: 'The Relational Field',
    color: '#d4a843',
    desc: 'The medium in which all healing occurs \u2014 presence, attunement, co-regulation, and witnessing. Not a technique but a condition. Without relational ground, the other dimensions cannot be safely contacted.'
  },
  'capacity-building': {
    category: 'Foundation \u00b7 Cascade 1',
    name: 'Capacity Building',
    color: '#c0392b',
    desc: 'Nervous system regulation and relational safety \u2014 the resources needed to enter difficult territory without overwhelm. Window of tolerance expansion, grounding, orienting, resourcing. The foundation everything else depends on.'
  },
  'physiological-completion': {
    category: 'Body \u00b7 Cascade 2',
    name: 'Physiological Completion',
    color: '#d35400',
    desc: 'Finishing thwarted survival responses the body still holds \u2014 incomplete fight, flight, freeze, fawn, collapse. The body must complete what was interrupted before higher-order processing becomes available.'
  },
  'affect-metabolization': {
    category: 'Body \u2192 Psyche \u00b7 Cascade 3',
    name: 'Affect Metabolization',
    color: '#d4a017',
    desc: 'Slowly digesting what couldn\'t be felt \u2014 grief under anger, terror under numbness, longing under self-sufficiency. Affects that were too much to process get stored; metabolization lets them finally move through.'
  },
  'differentiation': {
    category: 'Psyche \u00b7 Cascade 4',
    name: 'Differentiation',
    color: '#6a9b5a',
    desc: 'Distinguishing what was previously fused \u2014 past from present, part from whole self, feeling from story, awareness from content. The capacity to separate creates the space where insight and freedom emerge.'
  },
  'implicit-model-updating': {
    category: 'Psyche \u00b7 Cascade 5',
    name: 'Implicit Model Updating',
    color: '#5b8ca8',
    desc: 'Rewriting embodied predictions through corrective experience \u2014 old prediction active plus disconfirming experience plus awareness of mismatch equals lasting change. This is where deep repatterning happens.'
  },
  'identity-reorganization': {
    category: 'Identity \u00b7 Cascade 6',
    name: 'Identity Reorganization',
    color: '#6c5b9e',
    desc: 'Recovering the self that existed before or beneath the adaptations. Not who trauma made you \u2014 who you actually are. Identity shifts can be disorienting; this dimension honors the reorganization process.'
  },
  'shadow-integration': {
    category: 'Wholeness \u00b7 Orthogonal',
    name: 'Shadow Integration',
    color: '#2ecc71',
    desc: 'Re-owning what was banished from self-experience. Other dimensions work with what is stuck \u2014 shadow integration works with what is split off, actively excluded. It weaves through every level of the cascade.'
  },
  'energetic-reorganization': {
    category: 'Subtle Body \u00b7 Orthogonal',
    name: 'Energetic Reorganization',
    color: '#c77dba',
    desc: 'Felt-sense shifts between gross somatic and psychological meaning \u2014 maps as meridians, chakras, nadis. Requires soft, receptive attention. An orthogonal dimension that contacts every cascade level differently.'
  },
  'nondual-awareness': {
    category: 'Awareness \u00b7 Orthogonal',
    name: 'Nondual Awareness',
    color: '#f0e6c0',
    desc: 'The dimension of awareness itself \u2014 not as a technique but as the ever-present ground of experience. Recognition that awareness was never damaged, even when everything else was. Luminous, spacious, always already here.'
  }
};

const groups = document.querySelectorAll('.dim-group');
const panel = document.getElementById('infoPanel');
const closeBtn = document.getElementById('closePanel');
const hint = document.getElementById('hint');
let activeId = null;

function showDimension(id) {
  const d = dimensionData[id];
  if (!d) return;

  activeId = id;

  document.getElementById('dimCategory').textContent = d.category;
  document.getElementById('dimCategory').style.color = d.color;
  document.getElementById('dimName').textContent = d.name;
  document.getElementById('dimName').style.color = d.color;
  document.getElementById('dimDesc').textContent = d.desc;
  panel.style.borderColor = d.color + '40';
  panel.classList.add('active');
  hint.style.opacity = '0';

  // Dim all others, highlight selected
  groups.forEach(g => {
    const gid = g.getAttribute('data-dim');
    if (gid === id) {
      g.classList.add('highlighted');
      g.classList.remove('dimmed');
    } else {
      g.classList.add('dimmed');
      g.classList.remove('highlighted');
    }
  });
}

function clearSelection() {
  activeId = null;
  panel.classList.remove('active');
  hint.style.opacity = '1';
  groups.forEach(g => {
    g.classList.remove('dimmed', 'highlighted');
  });
}

groups.forEach(g => {
  g.addEventListener('click', (e) => {
    e.stopPropagation();
    const id = g.getAttribute('data-dim');
    if (activeId === id) {
      clearSelection();
    } else {
      showDimension(id);
    }
  });

  // Hover preview (only when nothing is selected)
  g.addEventListener('mouseenter', () => {
    if (activeId) return;
    groups.forEach(other => {
      if (other !== g) other.classList.add('dimmed');
    });
    g.classList.add('highlighted');
  });

  g.addEventListener('mouseleave', () => {
    if (activeId) return;
    groups.forEach(other => {
      other.classList.remove('dimmed', 'highlighted');
    });
  });
});

closeBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  clearSelection();
});

// Click background to deselect
document.addEventListener('click', (e) => {
  if (activeId && !panel.contains(e.target)) {
    clearSelection();
  }
});
</script>
</body>
</html>
